name: Daily Blinkit Scraper + Bajaru Post

on:
  schedule:
    - cron: "30 0 * * *"    # 6:00 AM IST = 00:30 UTC every day
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run Blinkit scraper
        env:
          IS_DOCKER: "true"
          PINCODE: "700112"
        run: python3 main.py

      - name: Post data to Bajaru API
        env:
          BAJARU_API_KEY: ${{ secrets.BAJARU_API_KEY }}
          DEBUG_POST_PAYLOAD: "true"
          DEBUG_ONLY: "true"
        run: python3 poster.py

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: blinkit-prices-${{ github.run_number }}-${{ github.run_id }}
          path: output/
          retention-days: 90